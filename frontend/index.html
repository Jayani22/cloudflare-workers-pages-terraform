<!DOCTYPE html>
<html>
<head>
  <title>Cloudflare Frontend</title>
</head>
<body>
  <h1>Frontend from Cloudflare Pages 🌍</h1>
  <button onclick="callAPI()">Call Backend</button>
  <p id="result"></p>

  <script>
    async function callAPI() {
      const response = await fetch("https://my-backend-worker.mutcherlajayani.workers.dev");
      const data = await response.json();
      document.getElementById("result").innerText = data.message;
    }
  </script>
</body>
</html>
